services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # 멀티모델 경로 설정 (polyp + dental)
      - MODEL_PATH=/app/best.pt
      - DENTAL_MODEL_PATH=/app/best_dentex.pt
      # .env 파일에서 OPENAI_API_KEY 자동 로드 (V2 RAG용)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    env_file:
      - .env
    volumes:
      # RAG 벡터스토어 (컨테이너 재시작해도 유지)
      - ./rag/vectorstore:/app/rag/vectorstore
      # RAG 문서 폴더 (PDF 추가 시 컨테이너 재빌드 불필요)
      - ./rag/docs:/app/rag/docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
